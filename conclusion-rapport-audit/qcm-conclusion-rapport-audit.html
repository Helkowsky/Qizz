<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QCM — Conclusion et rapport d'audit</title>
<style>
  :root{
    --bg:#f4f6f8; --card:#ffffff; --ink:#0f3d5c; --ink2:#3a4a57; --muted:#8a99a6;
    --line:#e2e8ee; --accent:#0f6ea8; --accent-ink:#ffffff;
    --good:#1b6e2a; --good-bg:#eef6ef; --good-line:#7aa87f;
    --bad:#b01f24; --bad-bg:#fbeeee; --bad-line:#d98a8a;
    --warn:#b7791f; --shadow:0 2px 14px rgba(15,61,92,.08);
    --radius:14px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1620; --card:#16212e; --ink:#e8eef4; --ink2:#b6c4d0; --muted:#7f909e;
      --line:#26333f; --accent:#3aa0d6; --accent-ink:#06202e;
      --good:#7fd08c; --good-bg:#15271a; --good-line:#2f6a3a;
      --bad:#f0a0a0; --bad-bg:#2a1618; --bad-line:#7a3236;
      --warn:#e0b464; --shadow:0 2px 18px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font:16px/1.5 "Segoe UI",system-ui,-apple-system,sans-serif;
       -webkit-font-smoothing:antialiased}
  .wrap{max-width:860px;margin:0 auto;padding:20px 16px 60px}
  header.top{display:flex;align-items:center;gap:12px;margin:8px 0 22px;flex-wrap:wrap}
  header.top h1{font-size:19px;margin:0;font-weight:650;letter-spacing:.2px}
  header.top .sub{color:var(--muted);font-size:13px}
  .spacer{flex:1}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-size:15px}
  .btn{background:var(--accent);color:var(--accent-ink);padding:11px 18px;font-weight:600;
       box-shadow:var(--shadow);transition:transform .05s ease,filter .15s}
  .btn:hover{filter:brightness(1.06)} .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--accent);box-shadow:none;border:1.5px solid var(--line)}
  .btn.small{padding:7px 12px;font-size:13.5px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
        box-shadow:var(--shadow);padding:20px;margin:14px 0}
  .grid{display:grid;gap:12px}
  .modes{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
  .mode{display:flex;flex-direction:column;gap:6px;text-align:left;background:var(--card);
        border:1.5px solid var(--line);border-radius:12px;padding:16px;color:var(--ink);transition:border-color .15s,transform .05s}
  .mode:hover{border-color:var(--accent)} .mode:active{transform:translateY(1px)}
  .mode .t{font-weight:650;font-size:16px}
  .mode .d{color:var(--muted);font-size:13px}
  table.dom{width:100%;border-collapse:collapse;font-size:14px}
  table.dom th,table.dom td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  table.dom th{color:var(--muted);font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.4px}
  table.dom tr:last-child td{border-bottom:none}
  table.dom td.num{text-align:right;font-variant-numeric:tabular-nums}
  .dombtn{width:100%;text-align:left;background:transparent;color:var(--ink);padding:0;font-size:14px;font-weight:600}
  .dombtn:hover{color:var(--accent)}
  .bar{height:7px;border-radius:5px;background:var(--line);overflow:hidden;min-width:60px}
  .bar > i{display:block;height:100%;border-radius:5px}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600;letter-spacing:.3px}
  .pill.d1{background:#eaf3ea;color:#2f6a3a} .pill.d2{background:#fdf3e3;color:#9a6a15} .pill.d3{background:#fbeeee;color:#a33}
  @media (prefers-color-scheme: dark){.pill.d1{background:#173021;color:#8fce9c}.pill.d2{background:#2c2412;color:#e0b464}.pill.d3{background:#2a1618;color:#f0a0a0}}
  .pill.ajout{background:#efe6fb;color:#6b3fa0}
  .pill.reformule{background:#e7f0fb;color:#2b6cb0}
  .pill.maj{background:#fdeede;color:#b25b12}
  @media (prefers-color-scheme: dark){.pill.ajout{background:#241a33;color:#c3a3f0}}
  .qmeta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:12.5px;margin-bottom:6px}
  .qtext{font-size:18px;font-weight:600;line-height:1.45;margin:6px 0 16px}
  .choices{display:grid;gap:10px}
  .choice{display:flex;gap:12px;align-items:flex-start;text-align:left;background:var(--card);
          border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;color:var(--ink);font-size:15.5px;
          transition:border-color .12s,background .12s;width:100%}
  .choice:hover:not(:disabled){border-color:var(--accent)}
  .choice .k{flex:none;width:26px;height:26px;border-radius:7px;background:var(--line);color:var(--ink2);
             display:grid;place-items:center;font-weight:700;font-size:14px}
  .choice.correct{border-color:var(--good-line);background:var(--good-bg)}
  .choice.correct .k{background:var(--good);color:#fff}
  .choice.wrong{border-color:var(--bad-line);background:var(--bad-bg)}
  .choice.wrong .k{background:var(--bad);color:#fff}
  .choice:disabled{cursor:default;opacity:1}
  .explain{margin-top:16px;border-left:4px solid var(--accent);background:rgba(15,110,168,.06);
           border-radius:0 10px 10px 0;padding:13px 15px;font-size:14.5px}
  .explain.ok{border-color:var(--good);background:var(--good-bg)}
  .explain.ko{border-color:var(--bad);background:var(--bad-bg)}
  .explain .verdict{font-weight:700;margin-bottom:4px}
  .explain .art{color:var(--ink2)}
  .explain .ref{margin-top:7px;font-size:13px}
  .explain .ref b{color:var(--ink)}
  .renvoi{display:inline-block;margin-top:6px;font-size:12.5px;color:var(--accent);font-weight:600}
  .footbar{display:flex;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap}
  .prog{color:var(--muted);font-size:13.5px;font-variant-numeric:tabular-nums}
  .timer{font-variant-numeric:tabular-nums;font-weight:700;font-size:16px;padding:5px 12px;border-radius:9px;
         background:var(--line);color:var(--ink)}
  .timer.warn{color:#fff;background:var(--warn)}
  .scoreBig{font-size:46px;font-weight:800;letter-spacing:-1px}
  .scoreSub{color:var(--muted);font-size:15px}
  .rev{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0;font-size:14px}
  .rev .q{font-weight:600;margin-bottom:6px}
  .rev .mine{color:var(--bad)} .rev .good{color:var(--good)}
  .hidden{display:none!important}
  .kbd{font:12px ui-monospace,Consolas,monospace;background:var(--line);padding:1px 6px;border-radius:5px}
  .toggle{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--ink2);cursor:pointer;user-select:none}
  /* navigation par numéro */
  .numgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:6px;margin-top:8px}
  .numbtn{padding:7px 0;text-align:center;border:1.5px solid var(--line);border-radius:8px;background:var(--card);
          color:var(--ink);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  .numbtn:hover{border-color:var(--accent)}
  .numbtn.ok{background:var(--good-bg);border-color:var(--good-line);color:var(--good)}
  .numbtn.ko{background:var(--bad-bg);border-color:var(--bad-line);color:var(--bad)}
  .numbtn.cur{outline:2px solid var(--accent);outline-offset:1px}
  .jump{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .jump input{width:74px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);
              color:var(--ink);font-size:14px;font-family:inherit}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>🎓 QCM — Conclusion et rapport d'audit</h1>
    <span class="sub" id="matLabel"></span>
    <span class="spacer"></span>
    <button class="btn ghost small hidden" id="homeBtn">↩ Menu</button>
  </header>

  <!-- ÉCRAN 1 : menu -->
  <section id="screen-menu">
    <div class="card">
      <h2 style="margin:0 0 12px">Mode de révision</h2>
      <div class="grid modes">
        <button class="mode" data-mode="all"><span class="t">📚 Tout enchaîner</span><span class="d">Les questions dans l'ordre des thèmes, corrigé après chaque réponse.</span></button>
        <button class="mode" data-mode="random"><span class="t">🎲 Aléatoire (20)</span><span class="d">20 questions tirées au hasard sur tout le module.</span></button>
        <button class="mode" data-mode="exam"><span class="t">⏱️ Examen blanc (40)</span><span class="d">40 questions chronométrées, score final et revue.</span></button>
        <button class="mode" data-mode="errors"><span class="t">🔁 Réviser mes erreurs</span><span class="d">Uniquement les questions déjà ratées.</span></button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap">
        <h2 style="margin:0">Réviser par thème</h2>
        <span class="spacer"></span>
        <label class="toggle"><input type="checkbox" id="shuffleChoices"> mélanger les réponses</label>
      </div>
      <table class="dom">
        <thead><tr><th>Thème</th><th class="num">Q.</th><th class="num" style="width:120px">Réussite</th><th class="num">Vues</th></tr></thead>
        <tbody id="domBody"></tbody>
      </table>
      <div class="footbar">
        <button class="btn ghost small" id="resetStats">Réinitialiser mes statistiques</button>
      </div>
    </div>

    <div class="card">
      <h2 style="margin:0 0 8px">Aller à une question</h2>
      <div class="jump">
        <span style="color:var(--muted);font-size:14px">Saut direct au numéro :</span>
        <input type="number" id="jumpInput" min="1" placeholder="n°">
        <button class="btn small" id="jumpBtn">Ouvrir</button>
        <span class="spacer"></span>
        <span class="prog" id="totalCount"></span>
      </div>
      <div class="numgrid" id="numGrid"></div>
    </div>
  </section>

  <!-- ÉCRAN 2 : quiz -->
  <section id="screen-quiz" class="hidden">
    <div class="card">
      <div class="qmeta">
        <span id="qDom"></span> · <span id="qSub"></span>
        <span class="pill" id="qDiff"></span>
        <span id="qTags" style="display:inline-flex;gap:5px"></span>
        <span class="spacer"></span>
        <span class="timer hidden" id="timer">00:00</span>
      </div>
      <div class="qtext" id="qText"></div>
      <div class="choices" id="qChoices"></div>
      <div class="explain hidden" id="qExplain"></div>
      <div class="footbar">
        <span class="prog" id="qProg"></span>
        <span class="spacer"></span>
        <button class="btn ghost small" id="prevBtn">← Précédent</button>
        <button class="btn ghost small" id="skipBtn">Passer</button>
        <button class="btn small hidden" id="nextBtn">Suivant →</button>
        <button class="btn small hidden" id="finishExamBtn">Terminer</button>
      </div>
    </div>
  </section>

  <!-- ÉCRAN 3 : résultats -->
  <section id="screen-result" class="hidden">
    <div class="card" style="text-align:center">
      <div class="scoreBig" id="rScore"></div>
      <div class="scoreSub" id="rSub"></div>
      <div class="footbar" style="justify-content:center;margin-top:18px">
        <button class="btn" id="rAgain">Rejouer</button>
        <button class="btn ghost" id="rMenu">Menu</button>
        <button class="btn ghost" id="rReviewErrors">Réviser les erreurs</button>
      </div>
    </div>
    <div class="card" id="rReviewCard">
      <h2 style="margin:0 0 6px">Revue des réponses</h2>
      <div id="rReview"></div>
    </div>
  </section>
</div>

<script>
"use strict";
/* ============================================================
   QCM Planification de l'audit — lecteur autonome (mécanique TVA)
   Questions embarquées (marche en double-clic, sans serveur).
   ============================================================ */
const QUESTIONS = (()=>{ try{ return JSON.parse(document.getElementById("qdata").textContent)||[]; }catch(e){ return []; } })();
const MAT = "conclusion-rapport-audit";
const EXAM_N = 40, RANDOM_N = 20, EXAM_SECONDS = 40*60;

const $ = s => document.querySelector(s);
const el = (t,c,txt)=>{const e=document.createElement(t);if(c)e.className=c;if(txt!=null)e.textContent=txt;return e;};
const shuffle = a => {for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const escapeHtml=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

let STATE = {stats:loadStats(), run:null, timerId:null, remain:0};

/* ---------- stats localStorage ---------- */
function statsKey(){return "qcmstats_"+MAT;}
function loadStats(){try{return JSON.parse(localStorage.getItem(statsKey()))||{pq:{}};}catch(e){return {pq:{}};}}
function saveStats(){localStorage.setItem(statsKey(), JSON.stringify(STATE.stats));}
function record(id, ok){
  const pq=STATE.stats.pq; if(!pq[id])pq[id]={seen:0,correct:0,wrong:false};
  pq[id].seen++; if(ok){pq[id].correct++;pq[id].wrong=false;} else pq[id].wrong=true; saveStats();
}
function errorIds(){return Object.keys(STATE.stats.pq).filter(id=>STATE.stats.pq[id].wrong);}

/* ---------- menu ---------- */
function domainList(){
  const map=new Map();
  QUESTIONS.forEach(q=>{if(!map.has(q.domaine))map.set(q.domaine,[]);map.get(q.domaine).push(q);});
  return [...map.entries()].sort((a,b)=>a[0].localeCompare(b[0],'fr',{numeric:true}));
}
function buildMenu(){
  const body=$("#domBody"); body.innerHTML="";
  domainList().forEach(([dom,qs])=>{
    let seen=0,correct=0;
    qs.forEach(q=>{const s=STATE.stats.pq[q.id];if(s){seen+=s.seen;correct+=s.correct;}});
    const rate=seen?Math.round(100*correct/seen):null;
    const tr=el("tr");
    const td1=el("td"); const b=el("button","dombtn",dom); b.onclick=()=>startRun("domain",{domaine:dom}); td1.appendChild(b);
    const td2=el("td","num",String(qs.length));
    const td3=el("td","num");
    if(rate==null){td3.innerHTML="<span style='color:var(--muted)'>—</span>";}
    else{
      const wrap=el("div"); wrap.style.cssText="display:flex;align-items:center;gap:8px;justify-content:flex-end";
      const bar=el("div","bar"); const i=el("i"); i.style.width=rate+"%";
      i.style.background=rate>=75?"var(--good)":rate>=50?"var(--warn)":"var(--bad)"; bar.appendChild(i);
      const lab=el("span",null,rate+"%"); lab.style.cssText="font-variant-numeric:tabular-nums;min-width:38px";
      wrap.appendChild(bar);wrap.appendChild(lab);td3.appendChild(wrap);
    }
    const td4=el("td","num",seen?String(seen):"—");
    tr.append(td1,td2,td3,td4); body.appendChild(tr);
  });
  $("#totalCount").textContent=QUESTIONS.length+" questions au total";
  $("#matLabel").textContent="— "+QUESTIONS.length+" questions";
  buildNumGrid();
}
function buildNumGrid(){
  const g=$("#numGrid"); g.innerHTML="";
  QUESTIONS.forEach((q,i)=>{
    const b=el("button","numbtn",String(i+1));
    const s=STATE.stats.pq[q.id];
    if(s){ if(s.wrong)b.classList.add("ko"); else if(s.correct>0)b.classList.add("ok"); }
    b.title=q.domaine+" — "+q.sous_theme;
    b.onclick=()=>startRun("single",{index:i});
    g.appendChild(b);
  });
}

/* ---------- run building ---------- */
function startRun(mode,opt={}){
  let pool;
  if(mode==="domain") pool=QUESTIONS.filter(q=>q.domaine===opt.domaine);
  else if(mode==="single") pool=[QUESTIONS[opt.index]];
  else if(mode==="random") pool=shuffle([...QUESTIONS]).slice(0,RANDOM_N);
  else if(mode==="exam") pool=shuffle([...QUESTIONS]).slice(0,Math.min(EXAM_N,QUESTIONS.length));
  else if(mode==="errors"){const ids=new Set(errorIds()); pool=QUESTIONS.filter(q=>ids.has(q.id));
    if(!pool.length){alert("Aucune erreur enregistrée — réponds d'abord à quelques questions.");return;} pool=shuffle(pool);}
  else pool=[...QUESTIONS];
  if(mode==="all") pool=[...QUESTIONS];

  const shuffleC=$("#shuffleChoices").checked;
  const items=pool.map(q=>{
    let order=q.choix.map((_,i)=>i);
    if(shuffleC) order=shuffle([...order]);
    return {q,order,chosen:null,ok:null};
  });
  STATE.run={mode,items,idx:0,exam:mode==="exam"};
  show("quiz");
  if(mode==="exam") startTimer(); else {stopTimer();$("#timer").classList.add("hidden");}
  renderQ();
}

/* ---------- timer ---------- */
function fmt(s){const m=Math.floor(s/60),ss=s%60;return String(m).padStart(2,"0")+":"+String(ss).padStart(2,"0");}
function startTimer(){
  STATE.remain=EXAM_SECONDS; const t=$("#timer"); t.classList.remove("hidden","warn"); t.textContent=fmt(STATE.remain);
  STATE.timerId=setInterval(()=>{STATE.remain--;t.textContent=fmt(STATE.remain);
    if(STATE.remain<=60)t.classList.add("warn"); if(STATE.remain<=0){stopTimer();finishRun();}},1000);
}
function stopTimer(){if(STATE.timerId){clearInterval(STATE.timerId);STATE.timerId=null;}}

/* ---------- render ---------- */
function renderQ(){
  const run=STATE.run, it=run.items[run.idx], q=it.q;
  $("#qDom").textContent=q.domaine; $("#qSub").textContent=q.sous_theme||"";
  const diff=$("#qDiff"); diff.className="pill d"+(q.difficulte||1);
  diff.textContent=["","facile","moyen","difficile"][q.difficulte||1];
  const tg=$("#qTags"); tg.innerHTML=""; (q.tags||[]).forEach(t=>{const cls=t==="AJOUT"?"ajout":(t==="REFORMULÉ"?"reformule":"maj");tg.appendChild(el("span","pill "+cls,"["+t+"]"));});
  $("#qText").textContent=q.question;
  const box=$("#qChoices"); box.innerHTML="";
  it.order.forEach((origIdx,pos)=>{
    const c=el("button","choice");
    const k=el("span","k",String.fromCharCode(65+pos));
    const tx=el("span",null,q.choix[origIdx]);
    c.append(k,tx); c.onclick=()=>answer(pos,origIdx,c); box.appendChild(c);
  });
  $("#qExplain").className="explain hidden";
  $("#nextBtn").classList.add("hidden"); $("#finishExamBtn").classList.add("hidden");
  $("#skipBtn").classList.remove("hidden");
  $("#prevBtn").classList.toggle("hidden", run.idx===0);
  $("#qProg").textContent="Question "+(run.idx+1)+" / "+run.items.length+(run.exam?" · examen blanc":"");
  if(it.chosen!=null) replay(it);   // revisiting an already-answered question
}
function replay(it){
  const q=it.q, nodes=[...$("#qChoices").children];
  nodes.forEach((n,p)=>{n.disabled=true;const oi=it.order[p];
    if(oi===q.reponse)n.classList.add("correct"); else if(oi===it.chosen)n.classList.add("wrong");});
  $("#skipBtn").classList.add("hidden");
  showExplain(it);
}
function answer(pos,origIdx,node){
  const run=STATE.run, it=run.items[run.idx], q=it.q;
  if(it.chosen!=null) return;
  it.chosen=origIdx; it.ok=(origIdx===q.reponse); record(q.id,it.ok);
  const nodes=[...$("#qChoices").children];
  nodes.forEach((n,p)=>{n.disabled=true;const oi=it.order[p];
    if(oi===q.reponse)n.classList.add("correct"); else if(p===pos)n.classList.add("wrong");});
  $("#skipBtn").classList.add("hidden");
  if(run.exam){
    const last=run.idx===run.items.length-1;
    (last?$("#finishExamBtn"):$("#nextBtn")).classList.remove("hidden");
  }else{
    showExplain(it);
  }
}
function showExplain(it){
  const run=STATE.run, q=it.q, ex=$("#qExplain");
  const goodLetter=String.fromCharCode(65+it.order.indexOf(q.reponse));
  ex.className="explain "+(it.ok?"ok":"ko");
  let html="<div class='verdict' style='color:var("+(it.ok?"--good":"--bad")+")'>"+
    (it.ok?"✓ Correct":"✗ Faux — bonne réponse : "+goodLetter)+"</div>";
  html+="<div class='art'>"+escapeHtml(q.explication)+"</div>";
  if(q.ref) html+="<div class='ref'><b>Base :</b> "+escapeHtml(q.ref)+"</div>";
  if(q.renvoi) html+="<a class='renvoi' href='memento-conclusion-rapport-audit.html"+(q.anchor?("#"+q.anchor):"")+"' target='_blank'>📖 "+escapeHtml(q.renvoi)+"</a>";
  ex.innerHTML=html; ex.classList.remove("hidden");
  const last=run.idx===run.items.length-1;
  const nb=$("#nextBtn"); nb.classList.remove("hidden"); nb.textContent=last?"Terminer":"Suivant →";
}
function next(){const run=STATE.run; if(run.idx<run.items.length-1){run.idx++;renderQ();}else finishRun();}
function prev(){const run=STATE.run; if(run.idx>0){run.idx--;renderQ();}}
function skip(){const run=STATE.run; if(run.idx<run.items.length-1){run.idx++;renderQ();}else finishRun();}

/* ---------- finish ---------- */
function finishRun(){
  stopTimer();
  const run=STATE.run;
  const answered=run.items.filter(i=>i.chosen!=null);
  const correct=run.items.filter(i=>i.ok===true).length;
  const total=run.items.length, pct=total?Math.round(100*correct/total):0;
  $("#rScore").textContent=correct+" / "+total+"  ("+pct+"%)";
  let msg=answered.length+" répondues.";
  if(run.exam){const used=EXAM_SECONDS-STATE.remain; msg="Examen blanc — "+fmt(used)+" · "+answered.length+" répondues.";}
  msg+=pct>=80?" 🎯 Prêt pour l'examen !":pct>=60?" 👍 Continue à réviser.":" 📌 À retravailler.";
  $("#rSub").textContent=msg;
  const wrong=run.items.filter(i=>i.chosen!=null && !i.ok);
  const rev=$("#rReview"); rev.innerHTML="";
  if(!wrong.length) rev.innerHTML="<p style='color:var(--good)'>Aucune erreur sur cette série. Bravo !</p>";
  wrong.forEach(it=>{const q=it.q; const d=el("div","rev");
    d.innerHTML="<div class='q'>"+escapeHtml(q.question)+"</div>"+
      "<div class='mine'>✗ Ta réponse : "+escapeHtml(q.choix[it.chosen])+"</div>"+
      "<div class='good'>✓ Bonne réponse : "+escapeHtml(q.choix[q.reponse])+"</div>"+
      "<div class='art' style='color:var(--ink2);margin-top:5px'>"+escapeHtml(q.explication)+
      (q.ref?" <i>("+escapeHtml(q.ref)+")</i>":"")+"</div>";
    rev.appendChild(d);});
  STATE.run._mode=run.mode;
  show("result");
}

/* ---------- nav ---------- */
function show(name){
  ["menu","quiz","result"].forEach(s=>$("#screen-"+s).classList.toggle("hidden",s!==name));
  $("#homeBtn").classList.toggle("hidden",name==="menu");
  if(name==="menu") buildMenu();
  window.scrollTo(0,0);
}

/* ---------- events ---------- */
document.querySelectorAll(".mode").forEach(b=>b.onclick=()=>startRun(b.dataset.mode));
$("#nextBtn").onclick=next; $("#prevBtn").onclick=prev; $("#skipBtn").onclick=skip;
$("#finishExamBtn").onclick=finishRun;
$("#homeBtn").onclick=()=>{stopTimer();show("menu");};
$("#rMenu").onclick=()=>show("menu");
$("#rAgain").onclick=()=>startRun(STATE.run._mode,STATE.run._mode==="domain"?{domaine:STATE.run.items[0].q.domaine}:{});
$("#rReviewErrors").onclick=()=>startRun("errors");
$("#resetStats").onclick=()=>{if(confirm("Effacer toutes tes statistiques ?")){STATE.stats={pq:{}};saveStats();buildMenu();}};
$("#jumpBtn").onclick=()=>{const n=parseInt($("#jumpInput").value,10);
  if(n>=1&&n<=QUESTIONS.length)startRun("single",{index:n-1}); else alert("Numéro entre 1 et "+QUESTIONS.length);};
$("#jumpInput").addEventListener("keydown",e=>{if(e.key==="Enter")$("#jumpBtn").click();});

if(!QUESTIONS.length){
  $("#screen-menu").innerHTML="<div class='card'><b>Aucune question chargée.</b> Le bloc de données JSON est vide.</div>";
}else buildMenu();
</script>
</body>
</html>
